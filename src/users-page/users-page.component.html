<div class="users-page-wrapper">
  <app-users-filter 
    (filterChange)="filterUsers($event)"
  />
  <app-create-user 
    (createUser)="addUser($event)"
  />

  @if (filteredUsers$ | async; as users) {
    <app-user-card 
      [userList]="users"
      (deleteUser)="deleteUser($event)"
    />
  }

</div>
